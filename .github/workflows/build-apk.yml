name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 缓存 Gradle 依赖（加速后续构建）
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 下载 gradle-wrapper.jar（如果不存在）
      - name: Download Gradle Wrapper JAR
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"
          fi

      # 5. 赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 6. 上传 APK 为构建产物（可直接下载）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HolidayCount-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. 输出 APK 信息
      - name: Show APK info
        run: |
          echo "✅ Build successful!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
